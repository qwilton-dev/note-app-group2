server {
    listen 80;
    server_name qwilton.skbx.ru;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name qwilton.skbx.ru;

    ssl_certificate /etc/letsencrypt/live/qwilton.skbx.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qwilton.skbx.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    client_max_body_size 20M;

    # 1. API Бэкенда (имя сервиса из compose)
    location ~ ^/(auth|users|tasks|lists|steps|docs|openapi\.json) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Основное приложение (имя сервиса из compose)
    location /app/ {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        error_page 404 =200 /index.html;
    }

    # 3. Лендинг (имя сервиса из compose)
    location / {
        proxy_pass http://landing:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        error_page 404 =200 /index.html;
    }
}