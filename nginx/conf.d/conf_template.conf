server {
    listen 80;
    server_name localhost;

    client_max_body_size 20M;

    # 1. API Бэкенда
    location ~ ^/(auth|users|tasks|lists|steps|roadmap|docs|openapi\.json) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Основное приложение
    location /app/ {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 404 = @frontend_fallback;
    }

    location @frontend_fallback {
        rewrite ^ /index.html break;
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }

    # 3. Лендинг
    location / {
        proxy_pass http://landing:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 404 = @landing_fallback;
    }

    location @landing_fallback {
        rewrite ^ /index.html break;
        proxy_pass http://landing:80;
        proxy_set_header Host $host;
    }
    
}

